<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Stats</title>
  <style>
    body {
      font-family: Georgia, serif;
      text-align: center;
      background: #3071c6;
      padding: 40px;
      color: #FFD700;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      color: #FFD700;
    }
    .controls {
      margin: 0 auto 20px;
      max-width: 800px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }
    .controls select {
      padding: 8px 10px;
      font-size: 16px;
      border: 2px solid #FFD700;
      border-radius: 6px;
      background: transparent;
      color: #FFD700;
      font-family: Georgia, serif;
    }
    .controls select option {
      color: #1F5130;
    }
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 800px;
    }
    th, td {
      border: 2px solid #FFD700;
      padding: 12px;
      font-size: 18px;
      color: #FFD700;
    }
    th {
      background: #1F5130;
      color: #FFD700;
    }
    tr:nth-child(even) {
      background-color: rgba(255, 215, 0, 0.1);
    }
  </style>
</head>
<body>
    <div id="navbar"></div>
<script>
fetch('nav.html')
  .then(r=>r.text())
  .then(html=>document.getElementById('navbar').innerHTML = html);
</script>

  <h1>Player Stats</h1>
  <div class="controls">
    <label for="yearSelect">Tournament Year:</label>
    <select id="yearSelect">
      <option value="2025">2025</option>
      <option value="2026">2026</option>
    </select>
  </div>
  <table id="statsTable">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Games Played</th>
        <th>Games Won</th>
        <th>Rounds Won</th>
        <th>Points Total</th>
        <th>Player Stat</th>
      </tr>
    </thead>
    <tbody>
      <!-- Player rows will be inserted here -->
    </tbody>
  </table>

  <script>
    const MATCHES_URL = 'https://docs.google.com/spreadsheets/d/1DNBERSYTfFpNAyMX9yMESoNKgiHQb_7FHvx0mo694Ak/gviz/tq?tqx=out:json&sheet=Matches';
    const PLAYERS_URL = 'https://docs.google.com/spreadsheets/d/1DNBERSYTfFpNAyMX9yMESoNKgiHQb_7FHvx0mo694Ak/gviz/tq?tqx=out:json&sheet=Players';
    const ENROLLED_BY_YEAR = {
      2026: [
      'Hallie Robins',
      'Charles Fawcett',
      'Richard Gan',
      'Aditya Kumar',
      'Ben Klapaukh',
      'Kevin Lin',
      'Amir Golshani',
      'Nathaniel Fallow',
      'Chris Todd',
      'Alex McKie',
      'Avish Chand',
      'Casey Luo',
      'Nicolò Sala',
      'Ben Kernohan',
      'Alex Gomez',
      'Aydin Kilic',
      'Nhu Dinh',
      'Eric O\'Donnell'
      ]
    };

    const yearSelect = document.getElementById('yearSelect');
    const tableBody = document.querySelector('#statsTable tbody');
    const currentYear = String(new Date().getFullYear());

    if ([...yearSelect.options].some(option => option.value === currentYear)) {
      yearSelect.value = currentYear;
    }

    yearSelect.addEventListener('change', () => loadYearStats(yearSelect.value));
    loadYearStats(yearSelect.value);

    function parseDate(value) {
      if (!value) return null;

      if (value instanceof Date) {
        return Number.isNaN(value.getTime()) ? null : value;
      }

      const text = String(value).trim();

      if (text.startsWith('Date(')) {
        const parts = text.match(/\d+/g);
        if (!parts || parts.length < 3) return null;
        const [y, m, d, h = 0, mi = 0, s = 0] = parts.map(Number);
        return new Date(y, m, d, h, mi, s);
      }

      // Supports "DD/MM/YYYY", "DD/MM/YYYY HH:MM:SS", and "DD/MM/YYYY, HH:MM:SS".
      const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[\s,]+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/);
      if (match) {
        const [, d, m, y, h = '0', mi = '0', s = '0'] = match;
        return new Date(Number(y), Number(m) - 1, Number(d), Number(h), Number(mi), Number(s));
      }

      const fallback = new Date(text);
      return Number.isNaN(fallback.getTime()) ? null : fallback;
    }

    function parseRound(roundText) {
      if (!roundText || typeof roundText !== 'string' || !roundText.includes(':')) {
        return null;
      }
      const [a, b] = roundText.split(':').map(Number);
      if (Number.isNaN(a) || Number.isNaN(b)) return null;
      return { a, b };
    }

    function parseGvizRows(text) {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows || [];
    }

    function toNumber(value) {
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      const normalized = String(value ?? '').replace(/[^\d.-]/g, '');
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatPlayerStat(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2);
    }

    function loadYearStats(year) {
      tableBody.innerHTML = "<tr><td colspan='7'>Loading...</td></tr>";

      Promise.all([
        fetch(MATCHES_URL).then(res => res.text()),
        fetch(PLAYERS_URL).then(res => res.text())
      ])
        .then(([matchesText, playersText]) => {
          const rows = parseGvizRows(matchesText);
          const playerRows = parseGvizRows(playersText);
          const stats = {};
          const playerStatByName = {};

          const allPlayerNames = playerRows
            .map(row => String((row.c || [])[0]?.v || '').trim())
            .filter(Boolean);

          let roster = [...(ENROLLED_BY_YEAR[year] || [])];
          if (year === '2025') {
            const excludedNames = new Set(ENROLLED_BY_YEAR['2026'] || []);
            roster = allPlayerNames.filter(name => !excludedNames.has(name));
          }

          const hasControlledRoster = year === '2025' || roster.length > 0;

          function ensurePlayer(name) {
            if (!name) return;
            if (!stats[name]) {
              stats[name] = {
                name,
                gamesPlayed: 0,
                gamesWon: 0,
                roundsWon: 0,
                points: 0,
                playerStat: 0
              };
            }
          }

          roster.forEach(ensurePlayer);

          playerRows.forEach(row => {
            const cells = row.c || [];
            const name = String(cells[0]?.v || '').trim();
            if (!name) return;

            // Players sheet: column A = player name, column G = Player Stat.
            playerStatByName[name] = toNumber(cells[6]?.v ?? cells[6]?.f ?? 0);

            if (!hasControlledRoster) {
              ensurePlayer(name);
            }
          });

          rows.forEach(row => {
            const cells = row.c || [];
            const rawDate = cells[0]?.f || cells[0]?.v || '';
            const playerA = cells[1]?.v || '';
            const playerB = cells[2]?.v || '';
            const winner = cells[8]?.v || '';
            const parsed = parseDate(rawDate);
            if (!parsed || String(parsed.getFullYear()) !== year) {
              return;
            }

            if (hasControlledRoster) {
              if (!stats[playerA] || !stats[playerB]) return;
            } else {
              ensurePlayer(playerA);
              ensurePlayer(playerB);
            }

            if (!playerA || !playerB) return;

            stats[playerA].gamesPlayed += 1;
            stats[playerB].gamesPlayed += 1;

            if (winner && stats[winner]) {
              stats[winner].gamesWon += 1;
            }

            for (let i = 3; i <= 7; i += 1) {
              const round = parseRound(cells[i]?.v || '');
              if (!round) continue;

              stats[playerA].points += round.a;
              stats[playerB].points += round.b;

              if (round.a > round.b) {
                stats[playerA].roundsWon += 1;
              } else if (round.b > round.a) {
                stats[playerB].roundsWon += 1;
              }
            }
          });

          const players = Object.values(stats)
            .map(p => {
              p.playerStat = playerStatByName[p.name] ?? 0;
              return p;
            })
            .sort((a, b) => {
              if (b.playerStat !== a.playerStat) return b.playerStat - a.playerStat;
              if (b.gamesWon !== a.gamesWon) return b.gamesWon - a.gamesWon;
              if (b.roundsWon !== a.roundsWon) return b.roundsWon - a.roundsWon;
              if (b.points !== a.points) return b.points - a.points;
              return a.name.localeCompare(b.name);
            });

          renderRows(players);
        })
        .catch(err => {
          console.error('Failed to load stats:', err);
          tableBody.innerHTML = "<tr><td colspan='7'>Failed to load stats</td></tr>";
        });
    }

    function renderRows(players) {
      if (!players.length) {
        tableBody.innerHTML = "<tr><td colspan='7'>No data for selected year yet</td></tr>";
        return;
      }

      tableBody.innerHTML = '';
      players.forEach((p, i) => {
        const row = `<tr>
          <td>${i + 1}</td>
          <td>${p.name}</td>
          <td>${p.gamesPlayed}</td>
          <td>${p.gamesWon}</td>
          <td>${p.roundsWon}</td>
          <td>${p.points}</td>
          <td>${formatPlayerStat(p.playerStat)}</td>
        </tr>`;
        tableBody.insertAdjacentHTML('beforeend', row);
      });
    }
  </script>
</body>
</html>
