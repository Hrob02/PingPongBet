<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match History</title>
  <style>
    body {
      font-family: Georgia, serif;
      text-align: center;
      background: #3071c6;
      padding: 40px;
      color: #FFD700;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      color: #FFD700;
    }
    .controls {
      margin: 0 auto 20px;
      max-width: 1200px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }
    .controls select {
      padding: 8px 10px;
      font-size: 16px;
      border: 2px solid #FFD700;
      border-radius: 6px;
      background: transparent;
      color: #FFD700;
      font-family: Georgia, serif;
    }
    .controls select option {
      color: #1F5130;
    }
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1200px;
    }
    th, td {
      border: 2px solid #FFD700;
      padding: 12px;
      font-size: 18px;
      color: #FFD700;
    }
    th {
      background: #1F5130;
      color: #FFD700;
    }
    tr:nth-child(even) {
      background-color: rgba(255, 215, 0, 0.1);
    }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <script>
    fetch("nav.html")
      .then(res => res.text())
      .then(html => document.getElementById("navbar").innerHTML = html);
  </script>

  <h1>Match History</h1>
  <div class="controls">
    <label for="yearSelect">Tournament Year:</label>
    <select id="yearSelect">
      <option value="2025">2025</option>
      <option value="2026">2026</option>
    </select>
  </div>

  <table id="matchTable">
    <thead>
      <tr id="tableHeader"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1DNBERSYTfFpNAyMX9yMESoNKgiHQb_7FHvx0mo694Ak/gviz/tq?tqx=out:json&sheet=Matches";
    const yearSelect = document.getElementById('yearSelect');
    const tableBody = document.getElementById('tableBody');
    const headerRow = document.getElementById('tableHeader');
    const currentYear = String(new Date().getFullYear());

    if ([...yearSelect.options].some(option => option.value === currentYear)) {
      yearSelect.value = currentYear;
    }

    yearSelect.addEventListener('change', () => loadMatches(yearSelect.value));
    loadMatches(yearSelect.value);

    function parseDate(value) {
      if (!value) return null;

      if (value instanceof Date) {
        return Number.isNaN(value.getTime()) ? null : value;
      }

      const text = String(value).trim();

      if (text.startsWith('Date(')) {
        const parts = text.match(/\d+/g);
        if (!parts || parts.length < 3) return null;
        const [y, m, d, h = 0, mi = 0, s = 0] = parts.map(Number);
        return new Date(y, m, d, h, mi, s);
      }

      // Supports "DD/MM/YYYY", "DD/MM/YYYY HH:MM:SS", and "DD/MM/YYYY, HH:MM:SS".
      const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[\s,]+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/);
      if (match) {
        const [, d, m, y, h = '0', mi = '0', s = '0'] = match;
        return new Date(Number(y), Number(m) - 1, Number(d), Number(h), Number(mi), Number(s));
      }

      const fallback = new Date(text);
      return Number.isNaN(fallback.getTime()) ? null : fallback;
    }

    function loadMatches(selectedYear) {
      tableBody.innerHTML = "<tr><td colspan='12'>Loading...</td></tr>";
      headerRow.innerHTML = '';

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(txt => {
          const json = JSON.parse(txt.substring(47).slice(0, -2));
          const cols = json.table.cols.map(col => col.label).slice(0, 12);
          const rows = json.table.rows
            .map(row => {
              const cells = (row.c || []).slice(0, 12).map(cell => cell ? (cell.f || cell.v || '') : '');
              const rawDate = row.c?.[0]?.f || row.c?.[0]?.v || '';
              const parsedDate = parseDate(rawDate);
              return { cells, parsedDate };
            })
            .filter(entry => entry.cells[0] && !String(entry.cells[0]).toLowerCase().includes('auto-filled'))
            .filter(entry => entry.parsedDate && String(entry.parsedDate.getFullYear()) === selectedYear)
            .sort((a, b) => b.parsedDate - a.parsedDate);

          cols.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
          });

          tableBody.innerHTML = '';
          if (!rows.length) {
            tableBody.innerHTML = "<tr><td colspan='12'>No matches recorded for selected year yet</td></tr>";
            return;
          }

          rows.forEach(({ cells, parsedDate }) => {
            const tr = document.createElement('tr');
            cells.forEach((cell, i) => {
              const td = document.createElement('td');
              td.textContent = i === 0 && parsedDate ? parsedDate.toLocaleString() : cell;
              tr.appendChild(td);
            });
            tableBody.appendChild(tr);
          });
        })
        .catch(err => {
          console.error('Error loading match history:', err);
          tableBody.innerHTML = "<tr><td colspan='12'>Failed to load match data</td></tr>";
        });
    }

  </script>
</body>
</html>
